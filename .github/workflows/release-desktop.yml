name: Release (Desktop)

on:
  push:
    tags:
      - "desktop-v*"

jobs:
  # Fails fast, before any build runner spins up. The exe/app version is baked
  # from build assets (build/windows/info.json etc., generated from config.yml),
  # not from the tag -- so a mismatch would ship a binary whose version
  # disagrees with the release it is attached to. Reads only committed text, so
  # it needs no toolchain and runs on the cheapest runner.
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve and verify version
        id: version
        run: |
          tag_version="${GITHUB_REF_NAME#desktop-v}"
          file_version="$(cat desktop/version)"
          if [ "$tag_version" != "$file_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME disagrees with desktop/version ($file_version). Bump with: cd desktop && go run ./_cmd/version.go $tag_version"
            exit 1
          fi
          baked="$(grep -o '"file_version": "[^"]*"' desktop/build/windows/info.json | cut -d'"' -f4)"
          if [ "$baked" != "$file_version" ]; then
            echo "::error::desktop/build/windows/info.json ($baked) is stale against desktop/version ($file_version). Regenerate with: cd desktop && go run ./_cmd/version.go && wails3 task common:update:build-assets"
            exit 1
          fi
          echo "version=$file_version" >> "$GITHUB_OUTPUT"

  # One leg per target OS. Wails builds natively on each runner (no Docker
  # cross-compilation): the platform Taskfiles dispatch to their `build:native`
  # path when the host OS matches. fail-fast is off so one platform breaking
  # still surfaces the others' results; `release` needs the whole matrix, so a
  # single failure blocks the release rather than shipping a partial one.
  #
  # NOTE: inject.js picks its page->Go transport at runtime (WebView2 on
  # Windows, webkit.messageHandlers.external on macOS/Linux), so all three
  # binaries carry the interception bridge. macOS/Linux are not yet verified on
  # real hardware -- see desktop/multios.md.
  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
          # Pinned, not macos-latest, so the macOS/Xcode version can't change
          # under us without a commit. (The original reason was the actool crash
          # on macos-26 -- wails3 skill pitfalls #11 -- which no longer applies
          # now that generate:icons builds no asset catalog, but a pinned image
          # is still what we want for a release build.)
          - os: macos-15
            target: darwin
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # Only the KEY=VALUE lines: $GITHUB_ENV rejects the file's comments. bash
      # is present on every runner (Git Bash on Windows), so one step covers all.
      - name: Load pinned tool versions
        shell: bash
        run: grep -E '^[A-Z_]+=' .github/variables >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: desktop/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      # `go install` of the CLI compiles wails/v3, whose internal/operatingsystem
      # needs GTK4/WebKitGTK via cgo on Linux -- so this is required before the
      # CLI install below, not just for the GUI build. The package list lives
      # next to WAILS_VERSION because the two must move together.
      - name: Install Linux build dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${WAILS_LINUX_DEPS}

      # GOPATH/bin is added to PATH explicitly rather than assumed: `go install`
      # drops wails3 there and the next steps invoke it by name.
      - name: Install wails3 CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          # $GITHUB_PATH only applies from the next step, so verify via full path.
          "$(go env GOPATH)/bin/wails3" version
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Each task pulls in the frontend deps, regenerates the bindings
      # (gitignored) and its platform assets, then builds. See desktop/CLAUDE.md.
      - name: Build (Windows)
        if: matrix.target == 'windows'
        shell: bash
        working-directory: desktop
        run: wails3 task windows:build

      # Native arm64 only. macos-15 is Apple Silicon; an amd64 slice would be a
      # CGO cross-compile against the universal SDK (possible, but unverified
      # here and moot while the app is non-functional on macOS).
      - name: Build (macOS arm64)
        if: matrix.target == 'darwin'
        shell: bash
        working-directory: desktop
        run: wails3 task darwin:package

      - name: Build (Linux)
        if: matrix.target == 'linux'
        shell: bash
        working-directory: desktop
        run: wails3 task linux:build

      # Compress-Archive rather than `zip`: the Windows runners ship 7z and
      # PowerShell, but Git Bash there has no zip binary.
      - name: Package artifact (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        working-directory: desktop
        run: Compress-Archive -Path bin\tempoc.exe -DestinationPath "$env:GITHUB_WORKSPACE\tempoc-desktop-${{ needs.verify.outputs.version }}-windows-amd64.zip"

      # ditto (not zip) preserves the .app bundle's symlinks, code signature and
      # extended attributes.
      - name: Package artifact (macOS)
        if: matrix.target == 'darwin'
        shell: bash
        working-directory: desktop
        run: ditto -c -k --keepParent bin/tempoc.app "$GITHUB_WORKSPACE/tempoc-desktop-${{ needs.verify.outputs.version }}-darwin-arm64.zip"

      # The bare binary dynamically links GTK4/WebKitGTK, which the user installs
      # from their distro. A .deb/AppImage would carry that metadata; the tarball
      # is the low-friction first cut.
      - name: Package artifact (Linux)
        if: matrix.target == 'linux'
        shell: bash
        working-directory: desktop
        run: tar -czf "$GITHUB_WORKSPACE/tempoc-desktop-${{ needs.verify.outputs.version }}-linux-amd64.tar.gz" -C bin tempoc

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: tempoc-desktop-*
          if-no-files-found: error

  # Single job so the three artifacts land on one release without the matrix
  # legs racing to create it. Gated on the whole build matrix, so a partial
  # release never happens.
  release:
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "TEMPOC Desktop v${{ needs.verify.outputs.version }}"
          files: "tempoc-desktop-*"
          generate_release_notes: true
          draft: true
