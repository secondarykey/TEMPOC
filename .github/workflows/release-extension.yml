name: Release (Chrome extension)

on:
  push:
    tags:
      - "extension-v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#extension-v}" >> "$GITHUB_OUTPUT"

      - name: Create zip from chrome-extension/src/
        run: |
          cd chrome-extension/src
          zip -r "$GITHUB_WORKSPACE/tempoc-${{ steps.version.outputs.version }}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "TEMPOC v${{ steps.version.outputs.version }}"
          files: "tempoc-${{ steps.version.outputs.version }}.zip"
          generate_release_notes: true
          draft: true
