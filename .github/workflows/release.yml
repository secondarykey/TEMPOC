name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create zip from src/
        run: |
          cd src
          zip -r "../tempoc-${{ steps.version.outputs.version }}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TEMPOC v${{ steps.version.outputs.version }}"
          files: "tempoc-${{ steps.version.outputs.version }}.zip"
          generate_release_notes: true
