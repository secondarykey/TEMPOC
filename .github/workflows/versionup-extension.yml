name: Version Up (Chrome extension)

on:
  push:
    branches: [main]
    paths:
      - "chrome-extension/**"
  # Lets a release be retried without a dummy commit -- e.g. after fixing
  # GH_PAT. Re-running a failed run is not equivalent: it replays the workflow
  # file from the original commit, so fixes to this file are not picked up.
  workflow_dispatch:

# Shared with versionup-desktop.yml — see the note there.
concurrency:
  group: versionup
  cancel-in-progress: false

jobs:
  versionup:
    if: "!contains(github.event.head_commit.message, '[skip versionup]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Preflight, because a bad GH_PAT otherwise surfaces only at the very last
      # step, as an unreadable JSON parse error. Checkout is deliberately after
      # it: this repo is public, so checkout proves nothing about the token --
      # an empty or invalid one still clones anonymously.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Verify GH_PAT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: bash .github/scripts/verify-pat.sh "${{ github.repository }}" release-extension.yml

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compute and apply version
        id: versionup
        run: python chrome-extension/scripts/versionup.py

      - name: Check for file changes
        id: changes
        run: |
          if git diff --quiet chrome-extension/version chrome-extension/src/manifest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit on release branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="release/extension-v${{ steps.versionup.outputs.version }}"
          git checkout -b "$BRANCH"
          git add chrome-extension/version chrome-extension/src/manifest.json
          git commit -m "chore(chrome-extension): bump version to ${{ steps.versionup.outputs.version }} [skip versionup]"
          git push origin "$BRANCH"

      - name: Create PR and merge to main
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="release/extension-v${{ steps.versionup.outputs.version }}"
          VERSION="${{ steps.versionup.outputs.version }}"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(chrome-extension): bump version to $VERSION" \
            --body "Automated version bump of the Chrome extension to $VERSION"
          gh pr merge "$BRANCH" --merge --delete-branch \
            --subject "chore(chrome-extension): bump version to $VERSION [skip versionup]"

      # Deliberately not gated on `changed`: when chrome-extension/version was
      # bumped by hand (a minor/major release), versionup.py finds it untagged
      # and keeps it, so there is nothing to commit — but the tag still has to
      # be pushed, or the release never happens. The existence check below makes
      # this safe to re-run.
      - name: Push tag
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="extension-v${{ steps.versionup.outputs.version }}"
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::secrets.GH_PAT is empty or unset. A PAT is required here, not GITHUB_TOKEN: tags pushed with GITHUB_TOKEN do not trigger release-extension.yml."
            exit 1
          fi
          if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            if ! SHA=$(gh api "repos/${{ github.repository }}/git/ref/heads/main" --jq '.object.sha'); then
              echo "::error::Could not read main's SHA, despite the GH_PAT preflight passing. Re-run with the raw response:"
              gh api "repos/${{ github.repository }}/git/ref/heads/main" --include || true
              exit 1
            fi
            gh api "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/tags/$TAG" \
              -f sha="$SHA"
            echo "Created tag $TAG at $SHA"
          fi
