name: Version Up (Chrome extension)

on:
  push:
    branches: [main]
    paths:
      - "chrome-extension/**"
  # Lets a release be retried without a dummy commit -- e.g. after fixing
  # GH_PAT. Re-running a failed run is not equivalent: it replays the workflow
  # file from the original commit, so fixes to this file are not picked up.
  workflow_dispatch:

# Shared with versionup-desktop.yml — see the note there.
concurrency:
  group: versionup
  cancel-in-progress: false

jobs:
  versionup:
    if: "!contains(github.event.head_commit.message, '[skip versionup]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Preflight, because a bad GH_PAT does not surface until the very last
      # step otherwise, and it surfaces as an unreadable JSON parse error. Note
      # that checkout above proves nothing: this repo is public, so an empty or
      # invalid token still clones anonymously.
      - name: Verify GH_PAT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::secrets.GH_PAT is empty or unset. Add it under Settings > Secrets and variables > Actions. GITHUB_TOKEN cannot be used: tags it pushes do not trigger release-extension.yml."
            exit 1
          fi
          # Length only -- never the value. A classic PAT is 40 chars, a
          # fine-grained one ~93. A length of 41 typically means a newline was
          # included when the secret was pasted.
          echo "GH_PAT length: ${#GH_TOKEN}"
          gh --version

          # Verified against the live API: an absent, empty or expired token all
          # yield 401 with a JSON body, and an anonymous request to this public
          # repo yields 200. So a 401 here means the secret's value is stale --
          # regenerating a PAT mints a new value, and the secret must be updated
          # to match; extending an expiry in the UI does not change the value.
          code=$(curl -sS -o /tmp/preflight -w '%{http_code}' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}")
          echo "GET /repos/${{ github.repository }} -> HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::PAT rejected (HTTP $code). 401 = wrong/stale value, 403 = valid but missing the 'repo' scope."
            head -c 300 /tmp/preflight
            exit 1
          fi

          # Reproduce the exact call that has been failing, here rather than at
          # the end of the job. `invalid character '<'` means gh got HTML where
          # JSON was due; the raw body below is what that HTML actually is,
          # since none of the auth failure modes above can produce it.
          if ! gh api "repos/${{ github.repository }}/git/ref/heads/main" --jq '.object.sha'; then
            echo "::error::gh could not read main's SHA even though the PAT is accepted. Raw response follows."
            gh api "repos/${{ github.repository }}/git/ref/heads/main" --include || true
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compute and apply version
        id: versionup
        run: python chrome-extension/scripts/versionup.py

      - name: Check for file changes
        id: changes
        run: |
          if git diff --quiet chrome-extension/version chrome-extension/src/manifest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit on release branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="release/extension-v${{ steps.versionup.outputs.version }}"
          git checkout -b "$BRANCH"
          git add chrome-extension/version chrome-extension/src/manifest.json
          git commit -m "chore(chrome-extension): bump version to ${{ steps.versionup.outputs.version }} [skip versionup]"
          git push origin "$BRANCH"

      - name: Create PR and merge to main
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="release/extension-v${{ steps.versionup.outputs.version }}"
          VERSION="${{ steps.versionup.outputs.version }}"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(chrome-extension): bump version to $VERSION" \
            --body "Automated version bump of the Chrome extension to $VERSION"
          gh pr merge "$BRANCH" --merge --delete-branch \
            --subject "chore(chrome-extension): bump version to $VERSION [skip versionup]"

      # Deliberately not gated on `changed`: when chrome-extension/version was
      # bumped by hand (a minor/major release), versionup.py finds it untagged
      # and keeps it, so there is nothing to commit — but the tag still has to
      # be pushed, or the release never happens. The existence check below makes
      # this safe to re-run.
      - name: Push tag
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="extension-v${{ steps.versionup.outputs.version }}"
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::secrets.GH_PAT is empty or unset. A PAT is required here, not GITHUB_TOKEN: tags pushed with GITHUB_TOKEN do not trigger release-extension.yml."
            exit 1
          fi
          if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            if ! SHA=$(gh api "repos/${{ github.repository }}/git/ref/heads/main" --jq '.object.sha'); then
              echo "::error::Could not read main's SHA, despite the GH_PAT preflight passing. Re-run with the raw response:"
              gh api "repos/${{ github.repository }}/git/ref/heads/main" --include || true
              exit 1
            fi
            gh api "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/tags/$TAG" \
              -f sha="$SHA"
            echo "Created tag $TAG at $SHA"
          fi
