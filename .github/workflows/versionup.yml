name: Version Up

on:
  push:
    branches: [main]

jobs:
  versionup:
    if: "!contains(github.event.head_commit.message, '[skip versionup]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compute and apply version
        id: versionup
        run: python scripts/versionup.py

      - name: Check for file changes
        id: changes
        run: |
          if git diff --quiet version src/manifest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit on release branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="release/v${{ steps.versionup.outputs.version }}"
          git checkout -b "$BRANCH"
          git add version src/manifest.json
          git commit -m "chore: bump version to ${{ steps.versionup.outputs.version }} [skip versionup]"
          git push origin "$BRANCH"

      - name: Create PR and merge to main
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="release/v${{ steps.versionup.outputs.version }}"
          VERSION="${{ steps.versionup.outputs.version }}"
          gh pr create --base main --head "$BRANCH" \
            --title "chore: bump version to $VERSION" \
            --body "Automated version bump to $VERSION"
          gh pr merge "$BRANCH" --merge --delete-branch \
            --subject "chore: bump version to $VERSION [skip versionup]"

      - name: Push tag
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="v${{ steps.versionup.outputs.version }}"
          if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            MERGE_SHA=$(gh api "repos/${{ github.repository }}/git/ref/heads/main" --jq '.object.sha')
            gh api "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/tags/$TAG" \
              -f sha="$MERGE_SHA"
            echo "Created tag $TAG at $MERGE_SHA"
          fi
