name: Version Up

on:
  push:
    branches: [main]

jobs:
  versionup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compute and apply version
        id: versionup
        run: python scripts/versionup.py

      - name: Commit on release branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="release/v${{ steps.versionup.outputs.version }}"
          git checkout -b "$BRANCH"
          git add version src/manifest.json
          git commit -m "chore: bump version to ${{ steps.versionup.outputs.version }} [skip ci]"
          git push origin "$BRANCH"

      - name: Merge to main and clean up branch
        run: |
          BRANCH="release/v${{ steps.versionup.outputs.version }}"
          git checkout main
          git merge --ff-only "$BRANCH"
          git push origin main
          git push origin --delete "$BRANCH"

      - name: Push tag
        run: |
          git tag "v${{ steps.versionup.outputs.version }}"
          git push origin "v${{ steps.versionup.outputs.version }}"
