<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEMPOC Settings</title>
  <style>
    :root {
      --color-accent:  #7dd3fc;
      --color-warning: #fbbf24;
      --color-danger:  #ef4444;
    }
    body {
      font-family: sans-serif;
      padding: 12px;
      min-width: 300px;
    }
    section {
      margin-bottom: 12px;
    }
    h2 {
      font-size: 0.9rem;
      margin: 0 0 6px;
      padding-bottom: 3px;
      border-bottom: 1px solid #ddd;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      font-size: 0.88rem;
    }
    .row label { cursor: pointer; }
    input[type="checkbox"] { cursor: pointer; }
    input[type="number"] {
      width: 52px;
      padding: 2px 4px;
      font-size: 0.9rem;
    }
    input[type="number"]:disabled { opacity: 0.4; }
    select {
      font-size: 0.9rem;
      padding: 2px 4px;
    }
    .unit { font-size: 0.85rem; color: #555; }

    /* ── dual range slider ── */
    .dual-range {
      position: relative;
      padding: 2px 0 14px;
    }
    .dual-range__values {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      margin-bottom: 4px;
    }
    .warning-label { color: #b45309; }
    .danger-label  { color: #b91c1c; }
    .dual-range__track {
      position: relative;
      height: 6px;
      border-radius: 3px;
      background: #d1d5db;
      margin: 8px 0;
    }
    .dual-range__fill {
      position: absolute;
      inset: 0;
      border-radius: 3px;
      pointer-events: none;
    }
    .zero-mark {
      position: absolute;
      left: 50%;
      top: -4px;
      bottom: -4px;
      width: 2px;
      background: rgba(0,0,0,0.25);
      transform: translateX(-50%);
      pointer-events: none;
    }
    .zero-mark::after {
      content: '0';
      position: absolute;
      top: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: #888;
    }
    .dual-range input[type="range"] {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      margin: 0;
      padding: 0;
      pointer-events: none;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      outline: none;
      height: 6px;
    }
    .dual-range input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      pointer-events: all;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #555;
      cursor: pointer;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    .dual-range input[type="range"]::-webkit-slider-runnable-track {
      background: transparent;
      height: 6px;
    }

    #status {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.72);
      color: #fff;
      font-size: 0.82rem;
      padding: 5px 14px;
      border-radius: 4px;
      white-space: nowrap;
      visibility: hidden;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <section>
    <h2>5-Hour Window</h2>
    <div class="row">
      <input type="checkbox" id="showHour5">
      <label for="showHour5">Show</label>
    </div>
    <div class="row">
      <input type="checkbox" id="showRemainHour5">
      <label for="showRemainHour5">Show remaining time</label>
    </div>
    <div class="dual-range" id="hour5Range">
      <div class="dual-range__values">
        <span class="warning-label">Warning: <b>0</b>% over</span>
        <span class="danger-label">Danger: <b>10</b>% over</span>
      </div>
      <div class="dual-range__track">
        <div class="dual-range__fill"></div>
        <span class="zero-mark"></span>
      </div>
      <input type="range" class="warning-input" min="-50" max="50" value="0">
      <input type="range" class="danger-input"  min="-50" max="50" value="10">
    </div>
  </section>

  <section>
    <h2>7-Day Window</h2>
    <div class="row">
      <input type="checkbox" id="showDay7">
      <label for="showDay7">Show</label>
    </div>
    <div class="row">
      <input type="checkbox" id="showRemainDay7">
      <label for="showRemainDay7">Show remaining time</label>
    </div>
    <div class="dual-range" id="day7Range">
      <div class="dual-range__values">
        <span class="warning-label">Warning: <b>0</b>% over</span>
        <span class="danger-label">Danger: <b>10</b>% over</span>
      </div>
      <div class="dual-range__track">
        <div class="dual-range__fill"></div>
        <span class="zero-mark"></span>
      </div>
      <input type="range" class="warning-input" min="-50" max="50" value="0">
      <input type="range" class="danger-input"  min="-50" max="50" value="10">
    </div>
  </section>

  <section>
    <h2>General</h2>
    <div class="row">
      <label for="decimalPlaces">Decimal places</label>
      <select id="decimalPlaces">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
      </select>
    </div>
    <div class="row">
      <label for="durationStyle">Duration style</label>
      <select id="durationStyle">
        <option value="narrow">Narrow (3d 4h)</option>
        <option value="short" selected>Short (3 days 4 hr.)</option>
        <option value="long">Long (3 days 4 hours)</option>
      </select>
    </div>
    <div class="row">
      <label for="percentFormat">Percent format</label>
      <input type="text" id="percentFormat" value="{}%" style="width:100px;padding:2px 4px;font-size:0.9rem;">
      <span class="unit">{} = value</span>
    </div>
    <div class="row">
      <input type="checkbox" id="enableRefresh">
      <label for="enableRefresh">Auto-refresh every</label>
      <input type="number" id="refreshMinutes" min="1" max="60" value="5" disabled>
      <span class="unit">min</span>
    </div>
  </section>

  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
