<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEMPOC Settings</title>
  <style>
    :root {
      --color-accent:  #7dd3fc;
      --color-warning: #fbbf24;
      --color-danger:  #ef4444;

      --bg:            #f4f4f5;
      --surface:       #ffffff;
      --text:          #18181b;
      --text-sub:      #52525b;
      --border:        #e4e4e7;
      --muted:         #71717a;
      --track-bg:      #d4d4d8;
      --thumb-bg:      #ffffff;
      --thumb-border:  #a1a1aa;
      --zero-mark:     rgba(0,0,0,0.18);
      --zero-label:    #a1a1aa;
      --warning-text:  #92400e;
      --danger-text:   #991b1b;
      --input-bg:      #ffffff;
      --input-border:  #d4d4d8;
      --input-focus:   #7dd3fc;
      --shadow:        0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            #141416;
        --surface:       #18181b;
        --text:          #f4f4f5;
        --text-sub:      #a1a1aa;
        --border:        #27272a;
        --muted:         #71717a;
        --track-bg:      #3f3f46;
        --thumb-bg:      #27272a;
        --thumb-border:  #71717a;
        --zero-mark:     rgba(255,255,255,0.2);
        --zero-label:    #52525b;
        --warning-text:  #fcd34d;
        --danger-text:   #fca5a5;
        --input-bg:      #27272a;
        --input-border:  #3f3f46;
        --input-focus:   #38bdf8;
        --shadow:        0 1px 3px rgba(0,0,0,.4);
      }
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.5;
      padding: 16px;
      width: 740px;
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }

    /* ── layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 14px;
      align-items: stretch;
    }
    #sec-hour5   { grid-column: 1; grid-row: 1; }
    #sec-day7    { grid-column: 1; grid-row: 2; }
    #sec-general {
      grid-column: 2; grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
    }
    #sec-general .rows {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── card ── */
    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px 4px;
      box-shadow: var(--shadow);
    }

    h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 12px;
    }

    /* ── rows ── */
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
    }
    .row {
      border-bottom: 1px solid var(--border);
    }
    .row label {
      flex: 1;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }

    /* ── toggle (checkbox styled) ── */
    input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 32px;
      height: 18px;
      border-radius: 9px;
      background: var(--track-bg);
      border: none;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: background .15s;
    }
    input[type="checkbox"]::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      top: 2px;
      left: 2px;
      transition: transform .15s;
      box-shadow: 0 1px 2px rgba(0,0,0,.25);
    }
    input[type="checkbox"]:checked {
      background: #3b82f6;
    }
    input[type="checkbox"]:checked::after {
      transform: translateX(14px);
    }

    /* ── select / number / text inputs ── */
    select,
    input[type="number"],
    input[type="text"] {
      font-size: 12px;
      font-family: inherit;
      padding: 4px 8px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      outline: none;
      transition: border-color .15s;
    }
    select:focus,
    input[type="number"]:focus,
    input[type="text"]:focus {
      border-color: var(--input-focus);
    }
    input[type="number"] { width: 56px; text-align: center; }
    input[type="number"]:disabled { opacity: 0.35; }
    input[type="text"] { width: 96px; }
    .unit { font-size: 11px; color: var(--muted); }

    /* ── dual range slider ── */
    .dual-range {
      position: relative;
      padding: 6px 0 4px;
      margin-top: 4px;
    }
    .dual-range__values {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      margin-bottom: 6px;
    }
    .warning-label { color: var(--warning-text); font-weight: 500; }
    .danger-label  { color: var(--danger-text);  font-weight: 500; }
    .dual-range__track {
      position: relative;
      height: 5px;
      border-radius: 3px;
      background: var(--track-bg);
      margin: 10px 0 20px;
    }
    .dual-range__track::before {
      content: '-50';
      position: absolute;
      top: calc(100% + 5px);
      left: 0;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--zero-label);
    }
    .dual-range__track::after {
      content: '50';
      position: absolute;
      top: calc(100% + 5px);
      right: 0;
      transform: translateX(50%);
      font-size: 10px;
      color: var(--zero-label);
    }
    .dual-range__fill {
      position: absolute;
      inset: 0;
      border-radius: 3px;
      pointer-events: none;
    }
    .zero-mark {
      position: absolute;
      left: 50%;
      top: -5px;
      bottom: -5px;
      width: 1px;
      background: var(--zero-mark);
      transform: translateX(-50%);
      pointer-events: none;
    }
    .zero-mark::after {
      content: '0';
      position: absolute;
      top: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--zero-label);
    }
    .dual-range input[type="range"] {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      margin: 0;
      padding: 0;
      pointer-events: none;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      outline: none;
      border: none;
      height: 5px;
    }
    .dual-range input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      pointer-events: all;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--thumb-bg);
      border: 1.5px solid var(--thumb-border);
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
      transition: box-shadow .15s;
    }
    .dual-range input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 1px 6px rgba(0,0,0,.35);
    }
    .dual-range input[type="range"]::-webkit-slider-runnable-track {
      background: transparent;
      height: 5px;
    }

    /* ── help text ── */
    .row--refresh {
      flex-direction: column;
      align-items: stretch;
      gap: 2px;
      padding: 4px 0;
    }
    .row-refresh__top {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .row-refresh__top label { flex: 1; }
    .help-text {
      font-size: 11px;
      color: var(--muted);
    }

    /* ── format preview ── */
    .row--preview {
      background: var(--bg);
      border-radius: 6px;
      padding: 4px 8px;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .preview-label {
      font-size: 11px;
      color: var(--muted);
    }
    .preview-value {
      font-size: 12px;
      color: var(--text-sub);
      font-family: ui-monospace, monospace;
      line-height: 1.7;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
    .preview-duration {
      white-space: nowrap;
      overflow: hidden;
    }
    .preview-percent {
      text-align: right;
    }

    /* ── toast ── */
    @keyframes toast-in  { from { opacity:0; transform:translateX(-50%) translateY(6px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @keyframes toast-out { from { opacity:1; } to { opacity:0; } }
    #status {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: #16a34a;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 20px;
      border-radius: 20px;
      white-space: nowrap;
      pointer-events: none;
      letter-spacing: .02em;
      box-shadow: 0 4px 14px rgba(22,163,74,.4);
      display: none;
    }
    #status.show {
      display: block;
      animation: toast-in .18s ease forwards;
    }
    #status.hide {
      animation: toast-out .25s ease forwards;
    }
  </style>
</head>
<body>
  <div class="layout">
    <section id="sec-hour5">
      <h2>5-Hour Window</h2>
      <div class="row">
        <label for="showHour5">Show</label>
        <input type="checkbox" id="showHour5">
      </div>
      <div class="row">
        <label for="showRemainHour5">Show remaining time</label>
        <input type="checkbox" id="showRemainHour5">
      </div>
      <div class="row">
        <label for="hour5ColorEnabled">Color threshold</label>
        <input type="checkbox" id="hour5ColorEnabled" checked>
      </div>
      <div class="dual-range" id="hour5Range">
        <div class="dual-range__values">
          <span class="warning-label">Warning: <b>0</b>% over</span>
          <span class="danger-label">Danger: <b>10</b>% over</span>
        </div>
        <div class="dual-range__track">
          <div class="dual-range__fill"></div>
          <span class="zero-mark"></span>
        </div>
        <input type="range" class="warning-input" min="-50" max="50" value="0">
        <input type="range" class="danger-input"  min="-50" max="50" value="10">
      </div>
    </section>

    <section id="sec-general">
      <h2>General</h2>
      <div class="rows">
        <div class="row">
          <label for="durationStyle">Duration style</label>
          <select id="durationStyle">
            <option value="narrow">Narrow (3d 4h)</option>
            <option value="short" selected>Short (3 days 4 hr.)</option>
            <option value="long">Long (3 days 4 hours)</option>
          </select>
        </div>
        <div class="row">
          <label for="decimalPlaces">Decimal places</label>
          <select id="decimalPlaces">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
          </select>
        </div>
        <div class="row">
          <label for="percentFormat">Percent format</label>
          <input type="text" id="percentFormat" value="{}%" style="text-align: right;">
        </div>
        <div class="row row--preview">
          <div class="preview-label">Preview</div>
          <div id="formatPreview" class="preview-value"></div>
        </div>
        <div class="row row--refresh">
          <div class="row-refresh__top">
            <label for="enableRefresh">Auto-refresh</label>
            <input type="checkbox" id="enableRefresh">
            <input type="number" id="refreshMinutes" min="1" max="60" value="2" disabled>
            <span class="unit">min</span>
          </div>
          <div class="help-text">Refreshes display independently of API calls</div>
        </div>
      </div>
    </section>

    <section id="sec-day7">
      <h2>7-Day Window</h2>
      <div class="row">
        <label for="showDay7">Show</label>
        <input type="checkbox" id="showDay7">
      </div>
      <div class="row">
        <label for="showRemainDay7">Show remaining time</label>
        <input type="checkbox" id="showRemainDay7">
      </div>
      <div class="row">
        <label for="day7ColorEnabled">Color threshold</label>
        <input type="checkbox" id="day7ColorEnabled" checked>
      </div>
      <div class="dual-range" id="day7Range">
        <div class="dual-range__values">
          <span class="warning-label">Warning: <b>0</b>% over</span>
          <span class="danger-label">Danger: <b>10</b>% over</span>
        </div>
        <div class="dual-range__track">
          <div class="dual-range__fill"></div>
          <span class="zero-mark"></span>
        </div>
        <input type="range" class="warning-input" min="-50" max="50" value="0">
        <input type="range" class="danger-input"  min="-50" max="50" value="10">
      </div>
    </section>
  </div>

  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
